<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Nahrani TXT souboru</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css')}}">
</head>
<body>
    <h1>Nahrani TXT souboru</h1>
    <from method="post" enctype="multipart/form-data">
        <lable for="file">Vyber TXT souboru:</lable>
        <input type="file" name="file" accept=".txt" required>
        <button type="submit">Odeslat</button>
    </from>

    {% if content %}
        <h2>Obsah souboru:</h2>
    <pre>{{ content }}</pre>
</body>
</html>
